spring.jpa.hibernate.ddl-auto=update

# Connect to the PostGIS container started by docker-compose (host port 5433 -> container 5432)
spring.datasource.url=jdbc:postgresql://localhost:5433/hiredb
spring.datasource.username=hire
spring.datasource.password=pass

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional but useful while debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Base64-encoded secret and token TTL (1 hour)
jwt.secret=bXktZGV2LWp3dC1zZWNyZXQtbXVzdC1iZS1yZXBsYWNlZC1pbi1wcm9k
jwt.ttl-ms=3600000