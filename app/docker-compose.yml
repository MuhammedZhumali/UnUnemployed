services:
  postgis:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: hire
      POSTGRES_PASSWORD: hire_pass
      POSTGRES_DB: hiredb
      PGDATABASE: hiredb
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hire -d hiredb -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s